# ===== Server =====
server.port=${PORT:8080}

# ===== MySQL DataSource =====
# Railway cung cấp biến MYSQL_URL tự động, fallback localhost cho dev
spring.datasource.url=${MYSQL_URL:jdbc:mysql://localhost:3306/stock_lap?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${MYSQL_USER:root}
spring.datasource.password=${MYSQL_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===== JPA / Hibernate =====
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=${SHOW_SQL:true}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ===== JWT =====
app.jwt.secret=${JWT_SECRET:c3RvY2tsYWItc2VjcmV0LWtleS1mb3Itand0LXRva2VuLWdlbmVyYXRpb24tMjAyNi1zdG9ja2xhYg==}
app.jwt.expiration-ms=86400000

# ===== CORS =====
app.cors.allowed-origins=${CORS_ORIGINS:http://localhost:5173,http://localhost:5174,http://localhost:80,http://localhost}

# ===== Redis =====
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}

# ===== Email (Gmail SMTP) =====
spring.mail.host=smtp.gmail.com
spring.mail.port=465
spring.mail.username=huyxchau@gmail.com
spring.mail.password=${MAIL_PASSWORD:your-app-password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.ssl.enable=true
# ===== SMS Configuration =====
app.sms.provider=twilio
app.twilio.account-sid=${TWILIO_ACCOUNT_SID:your-account-sid}
app.twilio.auth-token=${TWILIO_AUTH_TOKEN:your-auth-token}
app.twilio.from-number=+14782238566

# ===== Webhook Security =====
app.webhook.secret=${WEBHOOK_SECRET:stocklab-webhook-2026}

# ===== Trading Bot [Module 6] =====
# Bot đang tắt, khi nào cần thì mở lại
app.bot.enabled=false
app.bot.interval-ms=1000
# 20 bots (bot_01 ~ bot_20) trade with each other every 5s

