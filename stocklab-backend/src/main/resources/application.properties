# ===== Server =====
server.port=8080

# ===== MySQL DataSource =====
spring.datasource.url=jdbc:mysql://localhost:3306/stock_lap?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===== JPA / Hibernate =====
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ===== JWT =====
app.jwt.secret=c3RvY2tsYWItc2VjcmV0LWtleS1mb3Itand0LXRva2VuLWdlbmVyYXRpb24tMjAyNi1zdG9ja2xhYg==
app.jwt.expiration-ms=86400000

# ===== CORS =====
app.cors.allowed-origins=http://localhost:5173,http://localhost:5174

# ===== Redis =====
spring.data.redis.host=localhost
spring.data.redis.port=6379

# ===== Email (JavaMailSender) =====
spring.mail.host=sandbox.smtp.mailtrap.io
spring.mail.port=2525
spring.mail.username=your_mailtrap_username
spring.mail.password=your_mailtrap_password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
