# ===== Server =====
server.port=8080

# ===== MySQL DataSource =====
spring.datasource.url=jdbc:mysql://localhost:3306/stocklab?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=your_password
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===== JPA / Hibernate =====
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ===== JWT =====
app.jwt.secret=your-secret-key-here-change-this-in-production-must-be-at-least-256-bits
app.jwt.expiration-ms=86400000

# ===== CORS =====
app.cors.allowed-origins=http://localhost:5173
