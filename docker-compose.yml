
services:
  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: stocklab_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: stock_lap
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  # Redis Cache
  redis:
    image: redis:6-alpine
    container_name: stocklab_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  # Spring Boot Backend Minimal Runtime Requirements
  backend:
    build:
      context: ./stocklab-backend
      dockerfile: Dockerfile
    container_name: stocklab_backend
    restart: always
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/stock_lap?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=root
      - SPRING_DATA_REDIS_HOST=redis
    depends_on:
      - mysql
      - redis

  # React Frontend Host with minimal NGINX Base Container
  frontend:
    build:
      context: ./stocklab-frontend
      dockerfile: Dockerfile
    container_name: stocklab_frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  mysql_data:
  redis_data:
